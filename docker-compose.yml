services:
  postgres:
    image: postgres:16
    container_name: ulda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ulda}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ulda}"]
      interval: 5s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:1.0.0
    container_name: ulda-chroma
    restart: unless-stopped
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/api/v2/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ulda-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
    environment:
      APP_NAME: ${APP_NAME:-ULDA Backend}
      API_PREFIX: ${API_PREFIX:-/api}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ulda}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      FRONTEND_ORIGIN_LOCALHOST: ${FRONTEND_ORIGIN_LOCALHOST:-http://localhost:5173}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      CHROMA_COLLECTION_PREFIX: ${CHROMA_COLLECTION_PREFIX:-ulda}
      UPLOAD_STORAGE_DIR: /app/storage/uploads
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      ASSISTANT_SYSTEM_PROMPT: ${ASSISTANT_SYSTEM_PROMPT:-You are ULDA, an enterprise data assistant. Answer only from the supplied context. If the context is insufficient, say that clearly. Be concise, concrete, and cite the relevant sources.}
    volumes:
      - backend_uploads:/app/storage/uploads
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/docs >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: ulda-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    expose:
      - "80"
    networks:
      - default
      - caddy_net

volumes:
  postgres_data:
  chroma_data:
  backend_uploads:

networks:
  caddy_net:
    external: true
    name: bull_project_default
